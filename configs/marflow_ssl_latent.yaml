
dataset:
  name: cifar10-hf
  path: ./data

model: mar_ssl_latent

model_config:
  # Image settings for pixel-space generation
  # - vae_stride=1: PatchifyVAE is identity (no downsampling)
  # - patch_size=16: MAR groups 16x16 pixel patches
  # - 256/16 = 16x16 = 256 tokens
  # - token_embed_dim = 3 * 16^2 = 768 (all RGB pixels in each patch)
  img_size: 256
  vae_stride: 16              # Identity transform (pixel space)
  patch_size: 1             # Each token = 16x16 RGB patch = 768 dims
  vae_embed_dim: 16           # RGB channels

  sslenc: 'dinov2_vitg14_reg'
  sslenc_class_embed_num: 32
  sslenc_class_embed_start_layer: 10
  sslenc_lora_rank: 32
  sslenc_lora_alpha: 64

  sslenc_preenc_embed_dim: 768
  sslenc_preenc_depth: 1
  sslenc_preenc_num_heads: 16

  decoder_embed_dim: 1024
  decoder_depth: 2
  decoder_num_heads: 16

  # Training settings
  mask_ratio_min: 0.4
  label_drop_prob: 0.1
  attn_dropout: 0.1
  proj_dropout: 0.1
  # buffer_size: 64
  diffusion_batch_mul: 4
  grad_checkpointing: true

  # Flow Loss settings
  # - in_channels = 768 (token_embed_dim)
  # - SimpleTransformer spatial_size = sqrt(768/3) = 16
  diffloss_class: "FlowLoss"
  diffloss_kwargs:
    num_sampling_steps: 50
    net_class: "SimpleMLPAdaLN"
    net_kwargs:
      d_model: 1024
      depth: 6
      grad_checkpointing: true

    P_mean: -0.7
    P_std: 0.8
    t_eps: 0.02
    noise_scale: 1.0
    sampling_method: "euler"
    time_shift_scale: 1.0

  # Sampling settings
  # num_sampling_steps: 30
