# MAR Flow Full Base Config for 224x224 images (Pixel Space)
# Uses full-sequence denoising instead of token-wise denoising
#
# Key differences from marflow:
# - FlowLossFull: denoises all tokens together with cross-token attention
# - FullTransformer: per-token AdaLN conditioning
# - Attention mask: known tokens don't attend to masked tokens (enables KV caching)

model: mar_full_base

model_config:
  # Image settings for pixel-space generation
  # - vae_stride=1: Identity (no downsampling)
  # - patch_size=14: MAR groups 14x14 pixel patches
  # - 224/14 = 16x16 = 256 tokens
  # - token_embed_dim = 3 * 14^2 = 588
  img_size: 224
  vae_stride: 1
  patch_size: 14
  vae_embed_dim: 3

  # Training settings
  mask_ratio_min: 0.4
  label_drop_prob: 0.1
  attn_dropout: 0.1
  proj_dropout: 0.1
  buffer_size: 64
  diffusion_batch_mul: 4
  grad_checkpointing: true

  # DiffLoss (FlowLossFull) settings
  # - FullTransformer: cross-token attention during denoising
  # - seq_len: 196 (14x14 tokens)
  diffloss_kwargs:
    num_sampling_steps: 50
    net_class: "FullTransformer"
    net_kwargs:
      d_model: 768
      d_cond: null           # defaults to d_model
      depth: 6
      num_heads: 8
      mlp_ratio: 4.0
      attn_drop: 0.0
      proj_drop: 0.0
      grad_checkpointing: true
      use_fused_attn: true
      cond_method: "residual"   # per-token AdaLN conditioning
      cond_residual_layer: 1

    # Flow matching parameters
    P_mean: -0.8
    P_std: 0.8
    t_eps: 0.02
    noise_scale: 1.0
    sampling_method: "euler"
    time_shift_scale: 1.0
